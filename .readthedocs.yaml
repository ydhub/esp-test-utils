# Read the Docs configuration file.
# See https://docs.readthedocs.io/en/stable/config-file/v2.html

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  jobs:
    # The Makefile normally regenerates the API stubs via sphinx-apidoc, but
    # Read the Docs invokes sphinx-build directly, so do it here first.
    pre_build:
      - sphinx-apidoc --force --separate --module-first -o docs/api/_generated esptest

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

# Install the package (with core dependencies) plus the doc extra so autodoc
# can import esptest.
python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - doc
