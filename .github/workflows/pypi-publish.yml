# Upload esp-test-utils to PyPI when a GitHub release is created.
# Python >=3.10: commitizen>=4.1.1 in the [dev] extra requires it.

name: Publish PyPi Package

on:
  release:
    types: [created]

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Build Package
      run: |
        pip install -e '.[dev]'
        python -m build
    - name: Publish package ${{ github.event.release.tag_name }}
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
